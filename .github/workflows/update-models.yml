name: Update free models

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install
        run: pip install -e .

      - name: Refresh README free-model list
        # OpenRouter's /models endpoint needs no auth, so no key/secret here.
        run: python scripts/update_models.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh free-model list"
            git push
          else
            echo "no changes"
          fi
